version: "3.9"
services:
  db:
    image: postgres:16
    container_name: debt_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: debt_tracker
    ports:
      - "3432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: